name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        nim-version: ['version-2-0', 'devel']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: alaviss/setup-nim@0.1.1
        with:
          path: 'nim'
          version: ${{ matrix.nim-version }}
      - name: Run tests
        run: nimble test
